<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Playlist Generator - Login</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/client.js" defer></script>
</head>
<body>
    <div class="login-container">
        <h1>Please log in to create a Playlist</h1>
        
        <!-- Error message (hidden by default) -->
        <div id="login-error" class="login-error" style="display: none;">
            <p>Login failed, try again</p>
        </div>

        <button id="login">Login</button>
        
        <div class="loading-container">
            <video id="loading_animate" autoplay loop muted playsinline style="display: none;">
                <source src="/images/output.mp4" type="video/mp4">
            </video>
            <p id="loading_status"></p>
        </div>

        <button id="goBackButton">Go Back</button>

        <button id="get_numbers" style="display: none;">Get Numbers</button>
        <p id="numbers"></p>
        
        <div class="select-genres">
            <h1>Please select genres here</h1>
        </div>
        <button id="guffleButton" class="guffle-button" style="display: none;">GUFFLE!</button>
    </div>
</body>
</html>
